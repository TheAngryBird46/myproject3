<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .container{
            width:90%;
            max-width:600px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            resize:vertical;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:#fff;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .contact-info{
            margin-top:25px;
            text-align:center;
            color:#555;
            line-height:1.8;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Contact Us</h2>

    <form>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" placeholder="Enter subject">
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="Write your message..." required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
        <p><strong>📍 Address:</strong> Chennai, Tamil Nadu, India</p>
        <p><strong>📞 Phone:</strong> +91 98765 43210</p>
        <p><strong>📧 Email:</strong> info@example.com</p>
    </div>

</div>

</body>
</html>
